name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Allow manual deploys from the Actions tab (operator escape hatch).
  workflow_dispatch:

# A docs build doesn't depend on app state; cancel superseded runs on the
# same ref to keep CI throughput sensible.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # mkdocstrings reads ../src — make sure the working tree is
          # complete (default fetch-depth=1 is fine; we don't need history).
          fetch-depth: 1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements-docs.txt
      - name: Install docs deps
        working-directory: docs
        run: pip install -r requirements-docs.txt
      - name: Build (strict)
        working-directory: docs
        # --strict fails the build on any warning (broken links, missing nav
        # entries, etc.). Authors get a fast PR signal.
        run: mkdocs build --strict
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'workflow_dispatch'
        with:
          path: docs/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      # The deploy step needs id-token + pages write. The build step does
      # NOT need elevated perms; isolating them limits blast radius.
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
