user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Allow large file uploads (ZIP archives, tarballs) for scan submission.
    client_max_body_size 500m;

    # Rate-limit zones referenced by server blocks (nginx-http.conf / nginx-https.conf)
    limit_req_zone $binary_remote_addr zone=spa_zone:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

    include /etc/nginx/conf.d/*.conf;
}
