# OWASP Proactive Controls — C2: Use Cryptography to protect data
# Hand-authored enriched corpus (Framework Expansion enrichment effort).
# Rendered to the RAG corpus by scripts/build_enriched_corpus.py.
#
# Each entry: a security_rule (the principle), a vulnerability_pattern and
# secure_pattern (concept descriptions — no '*' or '[' — these feed the
# agent's generic fallback), and short seed-sized code_patterns per
# language (generic + Python/JavaScript/Java/C#).
#
# C2 covers protecting data with cryptography: authenticated encryption,
# strong algorithms, key management, cryptographically secure randomness,
# password hashing, transport security, and data at rest.

# ---------------------------------------------------------------------------
# Cryptographic Practices
# ---------------------------------------------------------------------------

- id: PC-C2.1
  facet: Cryptographic Practices
  section: Authenticated Encryption
  security_rule: >-
    Encrypting data must use an authenticated encryption mode that
    provides both confidentiality and integrity, so ciphertext tampering
    is detected on decryption rather than silently accepted.
  vulnerability_pattern: >-
    Data is encrypted with an unauthenticated mode such as ECB or raw
    CBC, so the ciphertext carries no integrity tag and an attacker can
    flip bits or reorder blocks without detection.
  secure_pattern: >-
    An authenticated encryption mode such as AES-GCM or ChaCha20-Poly1305
    is used, producing an authentication tag that decryption verifies
    before returning any plaintext.
  code_patterns:
    generic:
      vulnerable: |
        ciphertext = aesEncrypt(key, plaintext, mode="CBC")
      secure: |
        ciphertext, tag = aesGcmEncrypt(key, nonce, plaintext)
    python:
      vulnerable: |
        cipher = Cipher(algorithms.AES(key), modes.CBC(iv)).encryptor()
      secure: |
        ct = AESGCM(key).encrypt(nonce, plaintext, associated_data=None)
    javascript:
      vulnerable: |
        const c = crypto.createCipheriv("aes-256-cbc", key, iv);
      secure: |
        const c = crypto.createCipheriv("aes-256-gcm", key, nonce);
        const ct = Buffer.concat([c.update(pt), c.final(), c.getAuthTag()]);
    java:
      vulnerable: |
        Cipher c = Cipher.getInstance("AES/CBC/PKCS5Padding");
      secure: |
        Cipher c = Cipher.getInstance("AES/GCM/NoPadding");
        c.init(Cipher.ENCRYPT_MODE, key, new GCMParameterSpec(128, nonce));
    csharp:
      vulnerable: |
        using var aes = Aes.Create();   // CBC, no integrity tag
      secure: |
        using var gcm = new AesGcm(key, 16);
        gcm.Encrypt(nonce, plaintext, ciphertext, tag);

- id: PC-C2.2
  facet: Cryptographic Practices
  section: Strong Algorithms
  security_rule: >-
    Cryptographic operations must use current, standards-approved
    algorithms and key sizes, and must not use algorithms that are
    broken or deprecated such as DES, RC4, or MD5.
  vulnerability_pattern: >-
    A weak or obsolete cipher or hash such as DES, 3DES, RC4, or MD5 is
    used, so the protection it provides can be defeated with modern
    computing resources or known cryptanalysis.
  secure_pattern: >-
    A strong modern primitive is selected — AES-256 or ChaCha20 for
    encryption and SHA-256 or SHA-3 for hashing — with key sizes that
    meet current guidance.
  code_patterns:
    generic:
      vulnerable: |
        digest = md5(data)
      secure: |
        digest = sha256(data)
    python:
      vulnerable: |
        h = hashlib.md5(data).hexdigest()
      secure: |
        h = hashlib.sha256(data).hexdigest()
    javascript:
      vulnerable: |
        const h = crypto.createHash("md5").update(data).digest("hex");
      secure: |
        const h = crypto.createHash("sha256").update(data).digest("hex");
    java:
      vulnerable: |
        MessageDigest md = MessageDigest.getInstance("MD5");
      secure: |
        MessageDigest md = MessageDigest.getInstance("SHA-256");
    csharp:
      vulnerable: |
        using var md = MD5.Create();
      secure: |
        using var sha = SHA256.Create();

- id: PC-C2.3
  facet: Cryptographic Practices
  section: Cryptographically Secure Randomness
  security_rule: >-
    Values that must be unpredictable — tokens, session identifiers,
    nonces, salts, and keys — must be generated with a cryptographically
    secure random number generator.
  vulnerability_pattern: >-
    A general-purpose or statistical pseudo-random generator is used to
    produce a security-sensitive value, so its output is predictable and
    an attacker can guess or reproduce the value.
  secure_pattern: >-
    A cryptographically secure random source is used for every
    security-sensitive value, drawing from the operating system entropy
    pool with sufficient length.
  code_patterns:
    generic:
      vulnerable: |
        token = random()
      secure: |
        token = secureRandomBytes(32)
    python:
      vulnerable: |
        token = "".join(random.choice(chars) for _ in range(32))
      secure: |
        token = secrets.token_urlsafe(32)
    javascript:
      vulnerable: |
        const token = Math.random().toString(36).slice(2);
      secure: |
        const token = crypto.randomBytes(32).toString("hex");
    java:
      vulnerable: |
        long token = new Random().nextLong();
      secure: |
        byte[] token = new byte[32];
        SecureRandom.getInstanceStrong().nextBytes(token);
    csharp:
      vulnerable: |
        var token = new Random().Next();
      secure: |
        var token = RandomNumberGenerator.GetBytes(32);

- id: PC-C2.4
  facet: Cryptographic Practices
  section: Password Hashing
  security_rule: >-
    Stored user passwords must be protected with a memory-hard, salted,
    adaptive password hashing function such as Argon2id, scrypt, or
    bcrypt, never with a plain or fast cryptographic hash.
  vulnerability_pattern: >-
    Passwords are stored with a fast unsalted hash such as SHA-256 or
    MD5, so an attacker who obtains the database can crack the hashes at
    high speed with rainbow tables or brute force.
  secure_pattern: >-
    Passwords are hashed with a dedicated adaptive function that applies
    a unique per-password salt and a tunable work factor, making offline
    cracking deliberately expensive.
  code_patterns:
    generic:
      vulnerable: |
        stored = sha256(password)
      secure: |
        stored = argon2idHash(password)
    python:
      vulnerable: |
        stored = hashlib.sha256(password.encode()).hexdigest()
      secure: |
        from argon2 import PasswordHasher
        stored = PasswordHasher().hash(password)
    javascript:
      vulnerable: |
        const stored = crypto.createHash("sha256").update(password).digest("hex");
      secure: |
        const stored = await argon2.hash(password, { type: argon2.argon2id });
    java:
      vulnerable: |
        String stored = sha256Hex(password);
      secure: |
        String stored = new Argon2PasswordEncoder(16, 32, 1, 19456, 2).encode(password);
    csharp:
      vulnerable: |
        var stored = Convert.ToHexString(SHA256.HashData(bytes));
      secure: |
        var stored = BCrypt.Net.BCrypt.HashPassword(password, workFactor: 12);

- id: PC-C2.5
  facet: Cryptographic Practices
  section: Key Management
  security_rule: >-
    Cryptographic keys must not be hardcoded in source code, and must be
    loaded from a secrets manager, key vault, or protected environment
    configuration that supports rotation.
  vulnerability_pattern: >-
    An encryption key, signing key, or other secret is embedded as a
    literal in the source code, so anyone with read access to the
    repository can decrypt or forge protected data.
  secure_pattern: >-
    Keys are stored in a dedicated secrets manager or key management
    service and fetched at runtime, keeping them out of source control
    and allowing rotation without a code change.
  code_patterns:
    generic:
      vulnerable: |
        key = "5f4dcc3b5aa765d61d8327deb882cf99"
      secure: |
        key = secretsManager.getSecret("data-encryption-key")
    python:
      vulnerable: |
        KEY = b"hardcoded-aes-key-do-not-ship!!"
      secure: |
        KEY = secrets_client.get_secret_value(SecretId="data-key")["SecretBinary"]
    javascript:
      vulnerable: |
        const key = "supersecretkey1234567890abcdef12";
      secure: |
        const key = await vault.read("secret/data/encryption-key");
    java:
      vulnerable: |
        String key = "AKIA-hardcoded-secret-key-value";
      secure: |
        String key = secretsClient.getSecretValue(req).secretString();
    csharp:
      vulnerable: |
        const string Key = "0123456789abcdef0123456789abcdef";
      secure: |
        var key = await keyVaultClient.GetSecretAsync("encryption-key");

- id: PC-C2.6
  facet: Cryptographic Practices
  section: Encryption in Transit
  security_rule: >-
    Sensitive data must be transmitted over connections protected with
    current TLS, and connections must verify the server certificate and
    hostname rather than disabling validation.
  vulnerability_pattern: >-
    Data is sent over plaintext HTTP, or a TLS client disables
    certificate or hostname verification, so a network attacker can
    intercept or alter the traffic in a machine-in-the-middle position.
  secure_pattern: >-
    Connections use HTTPS with a modern TLS version, and certificate and
    hostname validation are left enabled so the peer identity is
    confirmed before any sensitive data is exchanged.
  code_patterns:
    generic:
      vulnerable: |
        response = httpGet("http://api.internal/data")
      secure: |
        response = httpsGet("https://api.internal/data", verifyTls=true)
    python:
      vulnerable: |
        r = requests.get(url, verify=False)
      secure: |
        r = requests.get(url, verify=True)
    javascript:
      vulnerable: |
        https.get(url, { rejectUnauthorized: false }, cb);
      secure: |
        https.get(url, { rejectUnauthorized: true }, cb);
    java:
      vulnerable: |
        sslContext.init(null, new TrustManager[]{ trustAllCerts }, null);
      secure: |
        SSLContext ctx = SSLContext.getDefault();   // platform trust + hostname check
    csharp:
      vulnerable: |
        handler.ServerCertificateCustomValidationCallback = (m, c, ch, e) => true;
      secure: |
        var handler = new HttpClientHandler();   // default certificate validation

- id: PC-C2.7
  facet: Cryptographic Practices
  section: Encryption at Rest
  security_rule: >-
    Sensitive data such as credentials, tokens, and personal information
    must be encrypted before it is written to persistent storage, not
    saved in plaintext.
  vulnerability_pattern: >-
    Sensitive fields are persisted to a database, file, or log in
    plaintext, so anyone who reads the storage medium — including from a
    backup or a stolen disk — sees the raw values.
  secure_pattern: >-
    Sensitive values are encrypted with an authenticated cipher and a
    managed key before being stored, so the data on disk is unreadable
    without access to the key.
  code_patterns:
    generic:
      vulnerable: |
        db.save(user_id, apiToken)
      secure: |
        db.save(user_id, encrypt(key, apiToken))
    python:
      vulnerable: |
        record.ssn = ssn
      secure: |
        record.ssn = Fernet(key).encrypt(ssn.encode())
    javascript:
      vulnerable: |
        await db.users.update({ id }, { cardNumber });
      secure: |
        await db.users.update({ id }, { cardNumber: encryptField(key, cardNumber) });
    java:
      vulnerable: |
        statement.setString(1, accountSecret);
      secure: |
        statement.setBytes(1, aesGcm.encrypt(accountSecret.getBytes()));
    csharp:
      vulnerable: |
        entity.AccessToken = token;
      secure: |
        entity.AccessToken = dataProtector.Protect(token);

- id: PC-C2.8
  facet: Cryptographic Practices
  section: Initialization Vectors and Nonces
  security_rule: >-
    Every encryption operation must use a unique initialization vector
    or nonce, generated fresh per message and never reused under the
    same key.
  vulnerability_pattern: >-
    A fixed, zero, or reused initialization vector is supplied to the
    cipher, so identical plaintexts produce identical ciphertext and, for
    counter-based modes, the keystream is catastrophically reused.
  secure_pattern: >-
    A fresh random or strictly counter-incremented nonce of the correct
    length is generated for each encryption call and stored or
    transmitted alongside the ciphertext.
  code_patterns:
    generic:
      vulnerable: |
        ciphertext = encrypt(key, plaintext, iv=STATIC_IV)
      secure: |
        iv = secureRandomBytes(12)
        ciphertext = encrypt(key, plaintext, iv=iv)
    python:
      vulnerable: |
        ct = AESGCM(key).encrypt(b"000000000000", plaintext, None)
      secure: |
        nonce = os.urandom(12)
        ct = AESGCM(key).encrypt(nonce, plaintext, None)
    javascript:
      vulnerable: |
        const c = crypto.createCipheriv("aes-256-gcm", key, ZERO_IV);
      secure: |
        const iv = crypto.randomBytes(12);
        const c = crypto.createCipheriv("aes-256-gcm", key, iv);
    java:
      vulnerable: |
        var spec = new GCMParameterSpec(128, new byte[12]);
      secure: |
        byte[] iv = new byte[12];
        SecureRandom.getInstanceStrong().nextBytes(iv);
        var spec = new GCMParameterSpec(128, iv);
    csharp:
      vulnerable: |
        var nonce = new byte[12];   // all zeros, reused every call
      secure: |
        var nonce = RandomNumberGenerator.GetBytes(12);

- id: PC-C2.9
  facet: Cryptographic Practices
  section: Constant-Time Comparison
  security_rule: >-
    Secret values such as authentication tokens, signatures, and
    message authentication codes must be compared with a constant-time
    routine so comparison timing does not leak how much matched.
  vulnerability_pattern: >-
    A secret is compared with an ordinary equality check that returns as
    soon as the first differing byte is found, so an attacker can measure
    response timing to recover the secret one byte at a time.
  secure_pattern: >-
    Secret comparisons use a constant-time equality function that always
    examines every byte, so the running time reveals nothing about how
    many leading bytes matched.
  code_patterns:
    generic:
      vulnerable: |
        if providedToken == expectedToken: grantAccess()
      secure: |
        if constantTimeEquals(providedToken, expectedToken): grantAccess()
    python:
      vulnerable: |
        if provided_mac == expected_mac:
            accept()
      secure: |
        if hmac.compare_digest(provided_mac, expected_mac):
            accept()
    javascript:
      vulnerable: |
        if (providedSig === expectedSig) accept();
      secure: |
        if (crypto.timingSafeEqual(Buffer.from(providedSig), Buffer.from(expectedSig)))
          accept();
    java:
      vulnerable: |
        if (providedToken.equals(expectedToken)) accept();
      secure: |
        if (MessageDigest.isEqual(providedBytes, expectedBytes)) accept();
    csharp:
      vulnerable: |
        if (providedToken == expectedToken) Accept();
      secure: |
        if (CryptographicOperations.FixedTimeEquals(provided, expected)) Accept();

- id: PC-C2.10
  facet: Cryptographic Practices
  section: Discrete Data Classification and Cryptographic Inventory
  security_rule: >-
    Teams must classify which data requires cryptographic protection and
    maintain an inventory of the algorithms, key sizes, and key
    locations in use so weak or expired cryptography can be found and
    replaced.
  vulnerability_pattern: >-
    No classification of sensitive data or inventory of cryptographic
    use exists, so weak algorithms, undersized keys, and expired keys
    persist unnoticed and protection is applied inconsistently.
  secure_pattern: >-
    Sensitive data is classified by protection need, and a maintained
    cryptographic inventory records each algorithm, key size, key owner,
    and rotation date, enabling planned upgrades and crypto-agility.
  code_patterns:
    generic:
      vulnerable: |
        # no data classification; crypto choices scattered and untracked
        encryptSomewhere(data)
      secure: |
        # classification + inventory drive a single reviewed crypto policy
        cryptoPolicy.encrypt(classify(data), data)
