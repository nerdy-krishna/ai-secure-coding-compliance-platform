# CWE Essentials — Concern Area 09: Authentication & Credential Management
# Hand-authored enriched corpus (Framework Expansion enrichment effort).
# Rendered to the RAG corpus by scripts/build_enriched_corpus.py.
#
# Each entry: a security_rule (the principle), a vulnerability_pattern and
# secure_pattern (concept descriptions — no '*' or '[' — these feed the
# agent's generic fallback), and short seed-sized code_patterns per
# language. CWE Essentials targets systems / native code, so code_patterns
# use the C / C++ / Rust / Go set (generic always included).
#
# CWEs: CWE-287, CWE-306, CWE-798, CWE-259, CWE-522, CWE-521, CWE-384

# ---------------------------------------------------------------------------
# CWE-287 — Improper Authentication
# ---------------------------------------------------------------------------

- id: CWE-287
  facet: Authentication & Credential Management
  section: Improper Authentication
  security_rule: >-
    Verify a claimed identity reliably before granting access, comparing
    the supplied credential against the stored secret with a constant-time
    check and rejecting the request on any failure or error path.
  vulnerability_pattern: >-
    The authentication check is incomplete or can be bypassed — a missing
    return on the failure branch, a comparison that leaks timing, or a
    code path that treats an error as a successful login.
  secure_pattern: >-
    Identity is established by a single trusted routine that verifies the
    credential with a constant-time comparison, fails closed on any error,
    and grants access only after an explicit positive result.
  code_patterns:
    generic:
      vulnerable: |
        if (verifyPassword(user, input) == false) { /* no return */ }
        grantAccess(user)              # reached even when the check failed
      secure: |
        if (!verifyPassword(user, input)) { denyAccess(); return; }
        grantAccess(user)
    c:
      vulnerable: |
        if (strcmp(input_token, stored_token) != 0)
            ; /* logged but not enforced */
        return AUTH_OK;
      secure: |
        if (sodium_memcmp(input_token, stored_token, TOKEN_LEN) != 0)
            return AUTH_FAIL;
        return AUTH_OK;
    cpp:
      vulnerable: |
        bool ok = (suppliedHash == storedHash);  // != bytes, may also leak timing
        return true;                              // result of ok ignored
      secure: |
        if (!crypto::constantTimeEquals(suppliedHash, storedHash))
            return false;
        return true;
    rust:
      vulnerable: |
        let _ = verify(&password, &hash);   // Result ignored, login proceeds
        Ok(Session::new(user))
      secure: |
        verify(&password, &hash).map_err(|_| AuthError::Invalid)?;
        Ok(Session::new(user))
    go:
      vulnerable: |
        if subtle.ConstantTimeCompare(got, want) == 0 {
        }                                    // empty body — fall through to allow
        return true
      secure: |
        if subtle.ConstantTimeCompare(got, want) != 1 {
            return false
        }
        return true

# ---------------------------------------------------------------------------
# CWE-306 — Missing Authentication for Critical Function
# ---------------------------------------------------------------------------

- id: CWE-306
  facet: Authentication & Credential Management
  section: Missing Authentication for Critical Function
  security_rule: >-
    Require an authentication check on every entry point that reaches a
    sensitive or administrative function, enforced server-side and not
    assumed from network position or client-side gating.
  vulnerability_pattern: >-
    A privileged operation such as an admin command, a configuration
    change, or an internal API is exposed on a handler that performs no
    identity check, so any caller who can reach it executes it.
  secure_pattern: >-
    Each handler for a critical function first calls a central
    authentication gate, and the operation runs only after the caller's
    identity has been positively established.
  code_patterns:
    generic:
      vulnerable: |
        def handle_admin_reset(request):
            wipe_database()            # no authentication check at all
      secure: |
        def handle_admin_reset(request):
            require_authenticated_admin(request)
            wipe_database()
    c:
      vulnerable: |
        void handle_cmd(conn_t *c) {
            if (c->opcode == OP_SHUTDOWN) do_shutdown();  /* no auth gate */
        }
      secure: |
        void handle_cmd(conn_t *c) {
            if (!c->authenticated) { send_error(c, E_AUTH); return; }
            if (c->opcode == OP_SHUTDOWN) do_shutdown();
        }
    cpp:
      vulnerable: |
        void RpcServer::onConfigWrite(const Request& r) {
            applyConfig(r.payload());          // anyone on the socket can call
        }
      secure: |
        void RpcServer::onConfigWrite(const Request& r) {
            if (!session_.isAuthenticated()) throw Unauthorized();
            applyConfig(r.payload());
        }
    rust:
      vulnerable: |
        async fn delete_all(State(db): State<Db>) -> StatusCode {
            db.purge().await; StatusCode::OK     // route has no auth extractor
        }
      secure: |
        async fn delete_all(admin: AdminUser, State(db): State<Db>) -> StatusCode {
            db.purge().await; StatusCode::OK     // AdminUser extractor authenticates
        }
    go:
      vulnerable: |
        mux.HandleFunc("/admin/restart", restartHandler)  // no middleware
      secure: |
        mux.Handle("/admin/restart", requireAuth(http.HandlerFunc(restartHandler)))

# ---------------------------------------------------------------------------
# CWE-798 — Use of Hard-coded Credentials
# ---------------------------------------------------------------------------

- id: CWE-798
  facet: Authentication & Credential Management
  section: Use of Hard-coded Credentials
  security_rule: >-
    Keep credentials such as API keys, service passwords, and tokens out
    of source code and version control; load them at runtime from a
    secrets manager or injected configuration and rotate them.
  vulnerability_pattern: >-
    A password, API key, or token is embedded as a literal in source or a
    committed config file, so anyone who reads the code or binary obtains
    the secret and it cannot be rotated without a rebuild.
  secure_pattern: >-
    The secret is supplied at runtime from an environment variable, a
    mounted secret, or a secrets manager, and the code holds only the
    name of where to fetch it.
  code_patterns:
    generic:
      vulnerable: |
        API_KEY = "sk_live_8fj2k9d0qpz"     # secret committed to the repo
      secure: |
        API_KEY = get_secret("service/api-key")   # fetched at runtime
    c:
      vulnerable: |
        const char *DB_PASS = "Pr0dPa55!";    /* baked into the binary */
      secure: |
        const char *DB_PASS = getenv("DB_PASS");
        if (DB_PASS == NULL) fatal("DB_PASS not set");
    cpp:
      vulnerable: |
        const std::string kAdminToken = "root:hunter2";  // shipped in the build
      secure: |
        const std::string adminToken = secrets::fetch("admin-token");
    rust:
      vulnerable: |
        const API_SECRET: &str = "ghp_3xampleHardCodedToken";
      secure: |
        let api_secret = std::env::var("API_SECRET")
            .expect("API_SECRET must be set");
    go:
      vulnerable: |
        const dbPassword = "S3cretP@ss"   // hard-coded credential
      secure: |
        dbPassword := os.Getenv("DB_PASSWORD")
        if dbPassword == "" { log.Fatal("DB_PASSWORD not set") }

# ---------------------------------------------------------------------------
# CWE-259 — Use of Hard-coded Password
# ---------------------------------------------------------------------------

- id: CWE-259
  facet: Authentication & Credential Management
  section: Use of Hard-coded Password
  security_rule: >-
    Never compare an incoming password against a literal embedded in the
    code or accept a fixed default password; verify against a salted hash
    of an externally provisioned credential.
  vulnerability_pattern: >-
    The authentication routine compares the supplied password to a
    constant string in the source, or grants access for a built-in
    default, so the same password works on every deployment.
  secure_pattern: >-
    Each account has its own credential provisioned out of band, stored
    only as a salted slow hash, and the login routine verifies against
    that hash rather than any literal.
  code_patterns:
    generic:
      vulnerable: |
        if input_password == "letmein123":      # hard-coded password literal
            grant_access()
      secure: |
        if password_hasher.verify(input_password, stored_hash):
            grant_access()
    c:
      vulnerable: |
        if (strcmp(pw, "admin") == 0) return LOGIN_OK;  /* fixed backdoor */
      secure: |
        if (crypto_pwhash_str_verify(stored_hash, pw, strlen(pw)) == 0)
            return LOGIN_OK;
    cpp:
      vulnerable: |
        bool login(const std::string& pw) { return pw == "service123"; }
      secure: |
        bool login(const std::string& pw) {
            return Argon2::verify(storedHash_, pw);
        }
    rust:
      vulnerable: |
        if password == "default" { return Ok(Session::admin()); }
      secure: |
        if argon2::verify_encoded(&stored_hash, password.as_bytes())? {
            return Ok(Session::admin());
        }
    go:
      vulnerable: |
        if password == "changeme" {           // built-in default password
            return true
        }
      secure: |
        err := bcrypt.CompareHashAndPassword(storedHash, []byte(password))
        return err == nil

# ---------------------------------------------------------------------------
# CWE-522 — Insufficiently Protected Credentials
# ---------------------------------------------------------------------------

- id: CWE-522
  facet: Authentication & Credential Management
  section: Insufficiently Protected Credentials
  security_rule: >-
    Store and transmit credentials only in protected form — passwords as
    salted hashes from a slow purpose-built algorithm, never reversibly,
    and never in plaintext logs or over an unencrypted channel.
  vulnerability_pattern: >-
    A password or token is stored in plaintext, encoded reversibly, hashed
    with a fast unsalted digest, or written to a log or cleartext channel,
    so anyone who reaches that store reads usable credentials.
  secure_pattern: >-
    Passwords are persisted only as salted hashes produced by a slow
    memory-hard algorithm, secrets in transit travel over an encrypted
    channel, and credentials are kept out of logs.
  code_patterns:
    generic:
      vulnerable: |
        db.save(user, password)            # plaintext password persisted
      secure: |
        db.save(user, slow_hash(password, random_salt()))
    c:
      vulnerable: |
        fprintf(store, "%s:%s\n", user, password);   /* plaintext on disk */
      secure: |
        char hash[crypto_pwhash_STRBYTES];
        crypto_pwhash_str(hash, password, strlen(password),
                          OPSLIMIT_INTERACTIVE, MEMLIMIT_INTERACTIVE);
        fprintf(store, "%s:%s\n", user, hash);
    cpp:
      vulnerable: |
        std::string stored = base64_encode(password);  // reversible, not hashed
      secure: |
        std::string stored = Argon2::hash(password, Salt::random());
    rust:
      vulnerable: |
        let digest = format!("{:x}", md5::compute(password));  // fast, unsalted
      secure: |
        let salt = SaltString::generate(&mut OsRng);
        let stored = Argon2::default()
            .hash_password(password.as_bytes(), &salt)?.to_string();
    go:
      vulnerable: |
        stored := sha256.Sum256([]byte(password))  // fast hash, no salt
      secure: |
        stored, _ := bcrypt.GenerateFromPassword([]byte(password), bcrypt.DefaultCost)

# ---------------------------------------------------------------------------
# CWE-521 — Weak Password Requirements
# ---------------------------------------------------------------------------

- id: CWE-521
  facet: Authentication & Credential Management
  section: Weak Password Requirements
  security_rule: >-
    Set credential strength by requiring sufficient length and screening
    new passwords against known-breached values, rather than relying on
    short minimums or brittle composition rules.
  vulnerability_pattern: >-
    The password policy permits very short values, imposes only narrow
    composition rules, or never checks the value against a breach
    corpus, so trivially guessable passwords are accepted.
  secure_pattern: >-
    A new password must meet a generous minimum length and is rejected if
    it appears in a known-breached or common-password list before the
    account is allowed to use it.
  code_patterns:
    generic:
      vulnerable: |
        if len(password) >= 6:             # 6 chars, no breach screening
            accept(password)
      secure: |
        if len(password) >= 12 and not is_breached(password):
            accept(password)
    c:
      vulnerable: |
        if (strlen(password) >= 4) return POLICY_OK;  /* far too short */
      secure: |
        if (strlen(password) >= 12 && !in_breach_list(password))
            return POLICY_OK;
        return POLICY_WEAK;
    cpp:
      vulnerable: |
        bool valid(const std::string& pw) { return pw.size() >= 6; }
      secure: |
        bool valid(const std::string& pw) {
            return pw.size() >= 12 && !breachList_.contains(pw);
        }
    rust:
      vulnerable: |
        fn ok(pw: &str) -> bool { pw.len() >= 6 }
      secure: |
        fn ok(pw: &str) -> bool {
            pw.chars().count() >= 12 && !breach_list.contains(pw)
        }
    go:
      vulnerable: |
        func valid(pw string) bool { return len(pw) >= 6 }
      secure: |
        func valid(pw string) bool {
            return utf8.RuneCountInString(pw) >= 12 && !breachList.Has(pw)
        }

# ---------------------------------------------------------------------------
# CWE-384 — Session Fixation
# ---------------------------------------------------------------------------

- id: CWE-384
  facet: Authentication & Credential Management
  section: Session Fixation
  security_rule: >-
    Issue a fresh, unpredictable session identifier on every
    authentication and privilege change, invalidating the pre-login
    identifier so it cannot survive into the authenticated session.
  vulnerability_pattern: >-
    The session identifier presented before login is reused for the
    authenticated session, so an identifier an attacker planted earlier
    becomes a valid logged-in session.
  secure_pattern: >-
    On successful authentication the old session is destroyed and a new
    random identifier is generated and bound to the now-authenticated
    user, so any pre-login identifier is invalidated.
  code_patterns:
    generic:
      vulnerable: |
        session.user = authenticated_user   # same session id kept after login
      secure: |
        old.destroy()
        session = new_session()             # fresh id issued at login
        session.user = authenticated_user
    c:
      vulnerable: |
        sess->user_id = uid;               /* pre-login session id reused */
      secure: |
        session_destroy(sess);
        sess = session_create();           /* new random id */
        sess->user_id = uid;
    cpp:
      vulnerable: |
        session.setUser(authedUser);        // id from before login unchanged
      secure: |
        sessionStore.destroy(session.id());
        session = sessionStore.create();    // regenerated id
        session.setUser(authedUser);
    rust:
      vulnerable: |
        session.insert("user_id", uid)?;    // existing session id retained
      secure: |
        session.cycle_id();                 // regenerate before binding identity
        session.insert("user_id", uid)?;
    go:
      vulnerable: |
        session.Values["uid"] = uid          // same cookie id survives login
        session.Save(r, w)
      secure: |
        session.Options.MaxAge = -1; session.Save(r, w)  // drop old session
        fresh, _ := store.New(r, "sid")                   // new id
        fresh.Values["uid"] = uid; fresh.Save(r, w)
