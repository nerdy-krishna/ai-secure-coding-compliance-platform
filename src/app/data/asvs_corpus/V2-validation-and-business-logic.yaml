- id: V2.2.2
  facet: Validation and Business Logic
  section: Input Validation
  level: 1
  security_rule: >-
    Input validation must be enforced at a trusted server-side service
    layer; client-side validation aids usability but must never be
    relied on as a security control.
  vulnerability_pattern: >-
    Validation is performed only in the browser, so a request crafted
    outside the UI or with the client checks disabled reaches the server
    with unvalidated data.
  secure_pattern: >-
    Every request is revalidated on the server at a trusted service
    layer regardless of any client-side checks, so bypassing the UI
    cannot bypass validation.
  code_patterns:
    generic:
      vulnerable: |
        # only the browser form checks the value
        server.save(request.body)
      secure: |
        server.validate(request.body)      # server revalidates every request
        server.save(request.body)
    python:
      vulnerable: |
        @app.post("/order")
        def order(data: dict): save(data)
      secure: |
        @app.post("/order")
        def order(data: OrderModel):       # server-side schema validation
            save(data)
    javascript:
      vulnerable: |
        app.post("/order", (req, res) => save(req.body));
      secure: |
        app.post("/order", (req, res) => {
          const { error, value } = orderSchema.validate(req.body);
          if (error) return res.sendStatus(400);
          save(value);
        });
    java:
      vulnerable: |
        @PostMapping("/order")
        void order(@RequestBody Order o) { save(o); }
      secure: |
        @PostMapping("/order")
        void order(@Valid @RequestBody Order o) { save(o); }
    csharp:
      vulnerable: |
        public IActionResult Order(Order o) => Save(o);
      secure: |
        public IActionResult Order(Order o) {
          if (!ModelState.IsValid) return BadRequest(ModelState);
          return Save(o);
        }

