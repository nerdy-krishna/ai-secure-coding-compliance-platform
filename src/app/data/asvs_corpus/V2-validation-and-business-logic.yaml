- id: V2.3.2
  facet: Validation and Business Logic
  section: Business Logic Security
  level: 2
  security_rule: >-
    Business logic limits described in the application's documentation
    must be implemented and enforced so documented limits cannot be
    exceeded and business logic flaws cannot be exploited.
  vulnerability_pattern: >-
    Documented limits such as maximum redemptions per coupon or items
    per order are not enforced at runtime, so a user can exceed them by
    repeating or manipulating requests.
  secure_pattern: >-
    Each documented business logic limit is enforced server-side on
    every relevant action, rejecting any request that would push the
    user or the system past the defined threshold.
  code_patterns:
    generic:
      vulnerable: |
        apply_coupon(code)                 # no redemption-count check
      secure: |
        if redemptions(code, user) >= LIMIT: reject("coupon limit reached")
        apply_coupon(code)
    python:
      vulnerable: |
        cart.add(item, qty)
      secure: |
        if cart.total_qty() + qty > BUSINESS_LIMITS.max_items:
            raise BusinessLimitError("item limit exceeded")
        cart.add(item, qty)
    javascript:
      vulnerable: |
        await transfers.create({ from, to, amount });
      secure: |
        const today = await transfers.sumToday(from);
        if (today + amount > LIMITS.dailyTransfer) throw new Error("limit");
        await transfers.create({ from, to, amount });
    java:
      vulnerable: |
        accountService.withdraw(account, amount);
      secure: |
        if (dailyWithdrawn(account) + amount > LIMITS.DAILY_WITHDRAWAL)
            throw new BusinessLimitException("daily limit exceeded");
        accountService.withdraw(account, amount);
    csharp:
      vulnerable: |
        _orders.Create(userId, items);
      secure: |
        if (_orders.CountToday(userId) >= Limits.MaxOrdersPerDay)
            throw new BusinessLimitException("daily order limit reached");
        _orders.Create(userId, items);

