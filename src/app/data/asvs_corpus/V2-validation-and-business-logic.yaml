# V2.4 — Anti-automation
# ---------------------------------------------------------------------------

- id: V2.4.1
  facet: Validation and Business Logic
  section: Anti-automation
  level: 2
  security_rule: >-
    Anti-automation controls must protect application functions from
    excessive calls that could cause data exfiltration, quota
    exhaustion, denial-of-service, or overuse of costly resources.
  vulnerability_pattern: >-
    Sensitive or expensive functions accept unlimited requests per
    client, so an automated script can scrape data, exhaust quotas, or
    drive up cost without any throttle.
  secure_pattern: >-
    Costly or sensitive endpoints enforce per-client rate limits or
    quotas, rejecting or delaying requests once a defined threshold over
    a time window is exceeded.
  code_patterns:
    generic:
      vulnerable: |
        def export_all(): return dump_every_record()   # no throttle
      secure: |
        if rate_limiter.exceeded(client_id): reject(429)
        return dump_every_record()
    python:
      vulnerable: |
        @app.get("/export")
        def export(): return all_rows()
      secure: |
        @app.get("/export")
        @limiter.limit("5/minute")
        def export(): return all_rows()
    javascript:
      vulnerable: |
        app.get("/search", (req, res) => res.json(searchAll(req.query)));
      secure: |
        const limiter = rateLimit({ windowMs: 60000, max: 30 });
        app.get("/search", limiter, (req, res) => res.json(searchAll(req.query)));
    java:
      vulnerable: |
        @GetMapping("/report")
        Report report() { return buildExpensiveReport(); }
      secure: |
        @GetMapping("/report")
        @RateLimiter(name = "report")
        Report report() { return buildExpensiveReport(); }
    csharp:
      vulnerable: |
        public IActionResult Export() => Ok(DumpAll());
      secure: |
        [EnableRateLimiting("expensive")]
        public IActionResult Export() => Ok(DumpAll());

