- id: V2.2.3
  facet: Validation and Business Logic
  section: Input Validation
  level: 2
  security_rule: >-
    The application must verify that combinations of related data items
    are reasonable and consistent according to predefined rules, not
    just that each field is individually well-formed.
  vulnerability_pattern: >-
    Related fields are validated independently, so a request with each
    field well-formed but the combination logically impossible — such as
    an end date before its start date — is accepted.
  secure_pattern: >-
    After per-field validation, predefined cross-field rules confirm
    that related data items are mutually consistent before the request
    is processed.
  code_patterns:
    generic:
      vulnerable: |
        validate(start); validate(end)     # never compared
      secure: |
        if end <= start: reject("end must be after start")
    python:
      vulnerable: |
        Booking(start=start, end=end)
      secure: |
        @model_validator(mode="after")
        def range_ok(self):
            if self.end <= self.start: raise ValueError("end before start")
            return self
    javascript:
      vulnerable: |
        const trip = { start, end };
      secure: |
        if (new Date(end) <= new Date(start))
          throw new Error("end must be after start");
    java:
      vulnerable: |
        Booking b = new Booking(start, end);
      secure: |
        if (!end.isAfter(start))
            throw new ValidationException("end must be after start");
    csharp:
      vulnerable: |
        var b = new Booking { Start = start, End = end };
      secure: |
        if (end <= start)
            throw new ValidationException("end must be after start");

