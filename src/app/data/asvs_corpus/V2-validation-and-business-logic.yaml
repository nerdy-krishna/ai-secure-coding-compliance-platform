# V2.3 — Business Logic Security
# ---------------------------------------------------------------------------

- id: V2.3.1
  facet: Validation and Business Logic
  section: Business Logic Security
  level: 1
  security_rule: >-
    A business logic flow must only be processed for a given user in the
    expected sequential step order, with no steps skipped or repeated
    out of sequence.
  vulnerability_pattern: >-
    Each step endpoint can be called directly without proof that earlier
    steps completed, so an attacker jumps straight to a later step such
    as checkout or confirmation and bypasses prior validation.
  secure_pattern: >-
    Server-side state records which step the user has reached, and each
    step endpoint verifies the prerequisite steps are complete before
    proceeding.
  code_patterns:
    generic:
      vulnerable: |
        def confirm_order(): finalize()    # callable before payment step
      secure: |
        def confirm_order():
            if session.step != "payment_done": reject("out of order")
            finalize()
    python:
      vulnerable: |
        @app.post("/checkout/confirm")
        def confirm(): place_order()
      secure: |
        @app.post("/checkout/confirm")
        def confirm():
            if session.get("stage") != "payment": abort(409)
            place_order()
    javascript:
      vulnerable: |
        app.post("/wizard/finish", (req, res) => complete(req.user));
      secure: |
        app.post("/wizard/finish", (req, res) => {
          if (req.session.stage !== "review") return res.sendStatus(409);
          complete(req.user);
        });
    java:
      vulnerable: |
        @PostMapping("/apply/submit")
        void submit() { finalizeApplication(); }
      secure: |
        @PostMapping("/apply/submit")
        void submit(HttpSession s) {
          if (!"verified".equals(s.getAttribute("stage"))) throw new Conflict();
          finalizeApplication();
        }
    csharp:
      vulnerable: |
        public IActionResult Confirm() => PlaceOrder();
      secure: |
        public IActionResult Confirm() {
          if (HttpContext.Session.GetString("Stage") != "Payment")
            return Conflict();
          return PlaceOrder();
        }

