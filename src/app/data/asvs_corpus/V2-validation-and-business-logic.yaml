- id: V2.3.3
  facet: Validation and Business Logic
  section: Business Logic Security
  level: 2
  security_rule: >-
    Business logic operations must be transactional so a multi-step
    operation either succeeds in its entirety or is fully rolled back to
    the previous correct state.
  vulnerability_pattern: >-
    A multi-step operation runs its steps without a transaction, so a
    failure partway through leaves the system in an inconsistent state,
    for example money debited but never credited.
  secure_pattern: >-
    All steps of a business logic operation execute inside a single
    transaction that commits only on full success and rolls back
    completely on any error.
  code_patterns:
    generic:
      vulnerable: |
        debit(from, amount); credit(to, amount)   # crash leaves debit only
      secure: |
        with transaction():
            debit(from, amount); credit(to, amount)
    python:
      vulnerable: |
        account_a.balance -= amt; db.commit()
        account_b.balance += amt; db.commit()
      secure: |
        with db.begin():                   # single atomic transaction
            account_a.balance -= amt
            account_b.balance += amt
    javascript:
      vulnerable: |
        await debit(from, amt); await credit(to, amt);
      secure: |
        await db.transaction(async (tx) => {
          await debit(tx, from, amt);
          await credit(tx, to, amt);
        });
    java:
      vulnerable: |
        repo.debit(from, amt); repo.credit(to, amt);
      secure: |
        @Transactional
        public void transfer(Id from, Id to, Money amt) {
          repo.debit(from, amt); repo.credit(to, amt);
        }
    csharp:
      vulnerable: |
        _repo.Debit(from, amt); _repo.Credit(to, amt);
      secure: |
        using var tx = _db.BeginTransaction();
        _repo.Debit(from, amt); _repo.Credit(to, amt);
        tx.Commit();

