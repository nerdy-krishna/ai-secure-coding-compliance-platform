# OWASP ASVS 5.0 — Chapter V2: Validation and Business Logic
# Hand-authored enriched corpus (Framework Expansion enrichment effort).
# Rendered to the RAG corpus by scripts/build_enriched_corpus.py.
#
# Each entry: a security_rule (the principle), a vulnerability_pattern and
# secure_pattern (concept descriptions — no '*' or '[' — these feed the
# agent's generic fallback), and short seed-sized code_patterns per
# language (generic + Python/JavaScript/Java/C# for ASVS).

# ---------------------------------------------------------------------------
# V2.1 — Validation and Business Logic Documentation
# ---------------------------------------------------------------------------

- id: V2.1.1
  facet: Validation and Business Logic
  section: Validation and Business Logic Documentation
  level: 1
  security_rule: >-
    The application's documentation must define input validation rules
    that describe how each data item is checked against its expected
    structure, covering common formats such as email addresses or card
    numbers as well as any internal data formats.
  vulnerability_pattern: >-
    Validation rules live only in scattered, undocumented code, so the
    expected structure of each field is unknown, applied inconsistently
    across endpoints, and impossible to review or test against.
  secure_pattern: >-
    A documented set of validation rules defines the expected structure
    of every data item once, and the code enforces those rules from that
    single shared definition.
  code_patterns:
    generic:
      vulnerable: |
        # email checked ad hoc, no documented rule
        if "@" in email: accept(email)
      secure: |
        # rule defined in the validation schema doc and enforced from it
        VALIDATION_RULES = {"email": EMAIL_FORMAT, "phone": E164_FORMAT}
        validate(email, VALIDATION_RULES["email"])
    python:
      vulnerable: |
        if "@" in form["email"]:
            save(form)
      secure: |
        class Signup(BaseModel):           # documented schema is the rule
            email: EmailStr
            phone: constr(pattern=E164)
        Signup(**form)

# ---------------------------------------------------------------------------

- id: V2.1.2
  facet: Validation and Business Logic
  section: Validation and Business Logic Documentation
  level: 2
  security_rule: >-
    The application's documentation must define how to validate the
    logical and contextual consistency of combined data items, for
    example confirming that a suburb matches its ZIP code.
  vulnerability_pattern: >-
    Each field is validated in isolation and no documented rule states
    how related fields must agree, so contextually impossible
    combinations are accepted.
  secure_pattern: >-
    Cross-field consistency rules are documented and enforced, checking
    that combinations of related data items agree with one another and
    with reference data before the record is accepted.
  code_patterns:
    generic:
      vulnerable: |
        validate(zip); validate(city)      # never compared to each other
      secure: |
        # documented cross-field rule: zip must resolve to city
        if lookup_city(zip) != city: reject("zip/city mismatch")
    python:
      vulnerable: |
        Address(zip=zip, city=city)        # fields independent
      secure: |
        @model_validator(mode="after")
        def zip_matches_city(self):
            if zip_city(self.zip) != self.city: raise ValueError("mismatch")
            return self

# ---------------------------------------------------------------------------

- id: V2.1.3
  facet: Validation and Business Logic
  section: Validation and Business Logic Documentation
  level: 2
  security_rule: >-
    Expectations for business logic limits and validations must be
    documented, covering both per-user limits and limits that apply
    globally across the whole application.
  vulnerability_pattern: >-
    Business logic limits such as maximum order size or daily transfer
    caps exist only as undocumented magic numbers, so they are
    inconsistent, unreviewed, and easy to omit on new code paths.
  secure_pattern: >-
    Per-user and global business logic limits are documented in one
    place and enforced from that shared definition, so every code path
    applies the same reviewed thresholds.
  code_patterns:
    generic:
      vulnerable: |
        if amount > 5000: reject()         # magic number, undocumented
      secure: |
        # limits documented and centralized
        LIMITS = {"transfer_per_txn": 5000, "transfer_per_day": 20000}
        if amount > LIMITS["transfer_per_txn"]: reject()
    python:
      vulnerable: |
        if order.qty > 100:
            raise Error("too many")
      secure: |
        from app.policy import BUSINESS_LIMITS   # documented limit table
        if order.qty > BUSINESS_LIMITS.max_order_qty:
            raise BusinessLimitError("order quantity limit exceeded")

# ---------------------------------------------------------------------------
# V2.2 — Input Validation
# ---------------------------------------------------------------------------

- id: V2.2.1
  facet: Validation and Business Logic
  section: Input Validation
  level: 1
  security_rule: >-
    Input must be validated to enforce business and functional
    expectations, preferring positive allowlist validation of values,
    patterns, and ranges over rejecting known-bad input.
  vulnerability_pattern: >-
    Input is accepted with no validation, or only a denylist of known
    bad values is applied, so any value outside the expected set passes
    and reaches business logic unchecked.
  secure_pattern: >-
    Input is validated against an allowlist of permitted values,
    patterns, and numeric ranges, and anything that does not match the
    expected structure is rejected before processing.
  code_patterns:
    generic:
      vulnerable: |
        status = request.status            # any string accepted
      secure: |
        if request.status not in {"open", "closed", "pending"}: reject()
    python:
      vulnerable: |
        priority = int(request.args["priority"])
      secure: |
        priority = int(request.args["priority"])
        if priority not in range(1, 6): abort(400)
    javascript:
      vulnerable: |
        const role = req.body.role;
      secure: |
        const ALLOWED = ["viewer", "editor"];
        if (!ALLOWED.includes(req.body.role)) return res.sendStatus(400);
    java:
      vulnerable: |
        String type = request.getParameter("type");
      secure: |
        if (!Set.of("A", "B", "C").contains(type)) throw new BadRequest();
    csharp:
      vulnerable: |
        var mode = Request.Query["mode"];
      secure: |
        if (!new[]{"fast","safe"}.Contains(mode)) return BadRequest();

