- id: V2.3.4
  facet: Validation and Business Logic
  section: Business Logic Security
  level: 2
  security_rule: >-
    Business logic level locking must protect limited-quantity resources
    such as seats or delivery slots so concurrent requests cannot
    double-book the same resource.
  vulnerability_pattern: >-
    A resource is checked for availability and then claimed in separate
    unsynchronized steps, so two concurrent requests both see it free
    and both claim it, double-booking the resource.
  secure_pattern: >-
    The check and the claim happen atomically under a lock or a
    conditional update, so only one of two concurrent requests can
    successfully reserve the limited resource.
  code_patterns:
    generic:
      vulnerable: |
        if seat.free: seat.free = false; book(seat)   # race window
      secure: |
        if not atomic_claim(seat): reject("already booked")
    python:
      vulnerable: |
        seat = Seat.get(id)
        if seat.available: seat.available = False; db.commit()
      secure: |
        updated = db.execute(
            update(Seat).where(Seat.id == id, Seat.available == True)
                        .values(available=False)).rowcount
        if updated == 0: abort(409)
    javascript:
      vulnerable: |
        if (slot.free) { slot.free = false; await slot.save(); }
      secure: |
        const r = await Slot.updateOne({ _id: id, free: true },
                                       { $set: { free: false } });
        if (r.modifiedCount === 0) throw new Error("slot taken");
    java:
      vulnerable: |
        Seat s = repo.find(id);
        if (s.isFree()) { s.setFree(false); repo.save(s); }
      secure: |
        int rows = repo.claimIfFree(id);   // UPDATE ... WHERE free = true
        if (rows == 0) throw new ConflictException("seat already booked");
    csharp:
      vulnerable: |
        var seat = _db.Seats.Find(id);
        if (seat.Free) { seat.Free = false; _db.SaveChanges(); }
      secure: |
        int rows = _db.Database.ExecuteSqlInterpolated(
          $"UPDATE Seats SET Free=0 WHERE Id={id} AND Free=1");
        if (rows == 0) throw new ConflictException("seat already booked");

