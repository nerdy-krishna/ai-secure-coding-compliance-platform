- id: V2.4.2
  facet: Validation and Business Logic
  section: Anti-automation
  level: 3
  security_rule: >-
    Business logic flows must require realistic human timing, rejecting
    transaction submissions that arrive faster than a real person could
    plausibly complete the flow.
  vulnerability_pattern: >-
    A flow accepts a submission with no minimum elapsed time since it
    started, so an automated client can complete it in milliseconds and
    submit far faster than any human.
  secure_pattern: >-
    The server records when a flow started and rejects a submission that
    arrives sooner than a realistic minimum completion time for a human.
  code_patterns:
    generic:
      vulnerable: |
        submit(form)                       # accepted instantly
      secure: |
        if now() - form.started_at < MIN_HUMAN_TIME: reject("too fast")
        submit(form)
    python:
      vulnerable: |
        @app.post("/checkout")
        def checkout(): place_order()
      secure: |
        @app.post("/checkout")
        def checkout():
            if time.time() - session["form_started"] < 2.0: abort(429)
            place_order()
    javascript:
      vulnerable: |
        app.post("/signup", (req, res) => createUser(req.body));
      secure: |
        app.post("/signup", (req, res) => {
          if (Date.now() - req.session.formStart < 2000)
            return res.sendStatus(429);
          createUser(req.body);
        });
    java:
      vulnerable: |
        @PostMapping("/apply")
        void apply() { submitApplication(); }
      secure: |
        @PostMapping("/apply")
        void apply(HttpSession s) {
          long started = (long) s.getAttribute("formStart");
          if (System.currentTimeMillis() - started < 2000) throw new TooFast();
          submitApplication();
        }
    csharp:
      vulnerable: |
        public IActionResult Apply() => Submit();
      secure: |
        public IActionResult Apply() {
          var started = HttpContext.Session.GetInt64("FormStart") ?? 0;
          if (Now() - started < 2000) return StatusCode(429);
          return Submit();
        }
