- id: V7.4.4
  facet: Session Management
  section: Session Termination
  level: 2
  security_rule: >-
    Every authenticated page must give the user easy and visible access to
    logout functionality.
  vulnerability_pattern: >-
    Logout is hidden, hard to reach, or absent on some authenticated
    views, so users on shared or public devices cannot reliably end their
    session.
  secure_pattern: >-
    A clearly labeled logout control is present and visible on every
    authenticated page, typically in a persistent header or navigation
    component.
  code_patterns:
    generic:
      vulnerable: |
        <nav>Home  Profile  Settings</nav>       <!-- no logout control -->
      secure: |
        <nav>Home  Profile  Settings  <a href="/logout">Log out</a></nav>
    javascript:
      vulnerable: |
        function Header() { return <nav><HomeLink/><ProfileLink/></nav>; }
      secure: |
        function Header() {
          return <nav><HomeLink/><ProfileLink/><button onClick={logout}>Log out</button></nav>;
        }

# ---------------------------------------------------------------------------

- id: V7.4.5
  facet: Session Management
  section: Session Termination
  level: 2
  security_rule: >-
    Application administrators must be able to terminate active sessions
    for an individual user or for all users.
  vulnerability_pattern: >-
    There is no administrative way to forcibly end sessions, so during an
    incident operators cannot evict a compromised account and must wait
    for sessions to time out.
  secure_pattern: >-
    An administrative function can revoke all sessions for a chosen user,
    and a global variant can revoke every session, by clearing the session
    store or advancing the relevant token cutoffs.
  code_patterns:
    generic:
      vulnerable: |
        # no admin path to end sessions; rely on timeout
      secure: |
        def admin_kill_sessions(target):
            backend.terminateAllSessions(target) if target else backend.terminateEverySession()
    python:
      vulnerable: |
        # admin can disable a user but cannot end their live sessions
      secure: |
        def force_logout(user_id=None):
            qs = Session.objects.all() if user_id is None else Session.objects.filter(user=user_id)
            qs.delete()
    javascript:
      vulnerable: |
        // no endpoint to revoke sessions
      secure: |
        adminRouter.post("/sessions/revoke", (req, res) =>
          sessionStore.destroyAllForUser(req.body.userId ?? "*").then(() => res.sendStatus(204)));
    java:
      vulnerable: |
        // SessionRegistry not exposed to admins
      secure: |
        void revoke(String userId) {
            sessionRegistry.getAllSessions(userId, false).forEach(SessionInformation::expireNow);
        }
    csharp:
      vulnerable: |
        // no admin session-revocation action
      secure: |
        public async Task RevokeAll(string userId) =>
            await _userManager.UpdateSecurityStampAsync(await _userManager.FindByIdAsync(userId));

# ---------------------------------------------------------------------------
# V7.5 — Defenses Against Session Abuse
# ---------------------------------------------------------------------------

- id: V7.5.1
  facet: Session Management
  section: Defenses Against Session Abuse
  level: 2
  security_rule: >-
    Modifying sensitive account attributes that affect authentication —
    email address, phone number, MFA configuration, or recovery
    information — must require full re-authentication first.
  vulnerability_pattern: >-
    A merely logged-in user can change their email, phone, or MFA settings
    without proving their identity again, so an attacker on a hijacked
    session can quietly take over the account recovery path.
  secure_pattern: >-
    Before any change to authentication-affecting attributes, the
    application forces a fresh full authentication and only then applies
    the change.
  code_patterns:
    generic:
      vulnerable: |
        if session.valid: updateEmail(user, newEmail)
      secure: |
        if not reauthenticated(user, providedCredentials): reject()
        updateEmail(user, newEmail)
    python:
      vulnerable: |
        @login_required
        def change_email(request): user.email = request.POST["email"]; user.save()
      secure: |
        @login_required
        def change_email(request):
            if not user.check_password(request.POST["password"]): return forbidden()
            user.email = request.POST["email"]; user.save()
    javascript:
      vulnerable: |
        app.post("/account/email", requireLogin, (req, res) => setEmail(req.user, req.body.email));
      secure: |
        app.post("/account/email", requireLogin, async (req, res) => {
          if (!await verifyPassword(req.user, req.body.password)) return res.sendStatus(403);
          setEmail(req.user, req.body.email);
        });
    java:
      vulnerable: |
        @PostMapping("/account/phone") void setPhone(@RequestParam String phone) { user.setPhone(phone); }
      secure: |
        @PostMapping("/account/phone") void setPhone(@RequestParam String phone, @RequestParam String pwd) {
            if (!passwordEncoder.matches(pwd, user.getHash())) throw new AccessDeniedException("reauth");
            user.setPhone(phone);
        }
    csharp:
      vulnerable: |
        [Authorize] public IActionResult ChangeEmail(string email) { _user.Email = email; return Ok(); }
      secure: |
        [Authorize] public async Task<IActionResult> ChangeEmail(string email, string password) {
            if (!await _signInManager.CheckPasswordSignInAsync(_user, password, false)) return Forbid();
            _user.Email = email; return Ok();
        }

# ---------------------------------------------------------------------------

- id: V7.5.2
  facet: Session Management
  section: Defenses Against Session Abuse
  level: 2
  security_rule: >-
    Users must be able to view their currently active sessions and, after
    authenticating again with at least one factor, terminate any or all of
    them.
  vulnerability_pattern: >-
    Users have no way to see where they are logged in or to revoke other
    sessions, so a user who suspects compromise cannot evict the attacker
    themselves.
  secure_pattern: >-
    The account area lists active sessions with identifying detail, and a
    revoke action, gated behind a fresh single-factor check, terminates a
    selected session or all other sessions.
  code_patterns:
    generic:
      vulnerable: |
        # no per-user session list, no self-service revoke
      secure: |
        showSessions(listSessions(user.id))
        on revoke: if reauth(user): backend.terminateSession(chosenId)
    python:
      vulnerable: |
        # account page shows profile only; sessions invisible to the user
      secure: |
        def sessions_view(request):
            return render("sessions.html", {"sessions": Session.objects.filter(user=request.user)})
        def revoke(request, sid):
            if request.user.check_password(request.POST["password"]):
                Session.objects.filter(user=request.user, pk=sid).delete()
    javascript:
      vulnerable: |
        // no /account/sessions route
      secure: |
        router.get("/account/sessions", (req, res) => res.json(listSessions(req.user.id)));
        router.post("/account/sessions/revoke", reauth, (req, res) =>
          sessionStore.destroy(req.body.sid, () => res.sendStatus(204)));
    java:
      vulnerable: |
        // SessionRegistry never surfaced to the end user
      secure: |
        @GetMapping("/account/sessions") List<SessionInfo> mine() { return sessionService.list(currentUser()); }
        @PostMapping("/account/sessions/{id}/revoke") void revoke(@PathVariable String id) {
            requireRecentAuth(); sessionService.expire(id);
        }
    csharp:
      vulnerable: |
        // no UI or API for users to see or kill their sessions
      secure: |
        [Authorize] public IActionResult Sessions() => View(_sessionService.List(User.GetId()));
        [Authorize] public IActionResult Revoke(string id) {
            RequireRecentAuth(); _sessionService.Expire(id); return RedirectToAction("Sessions");
        }

