# V7.6 — Federated Re-authentication
# ---------------------------------------------------------------------------

- id: V7.6.1
  facet: Session Management
  section: Federated Re-authentication
  level: 2
  security_rule: >-
    Session lifetime and termination between relying parties and identity
    providers must behave as documented, forcing re-authentication when
    the maximum time since the last identity provider authentication is
    reached.
  vulnerability_pattern: >-
    The relying party honors only its own local session and ignores when
    the identity provider last authenticated the user, so a stale federated
    session persists long past the documented coordinated lifetime.
  secure_pattern: >-
    The relying party records the identity provider authentication time
    from the assertion and forces a fresh federated authentication once
    the documented maximum age has elapsed.
  code_patterns:
    generic:
      vulnerable: |
        if rpSession.valid: allow()              # IdP auth_time ignored
      secure: |
        if now - session.idp_auth_time > MAX_IDP_AGE: redirectToIdpReauth()
        else: allow()
    python:
      vulnerable: |
        if request.session.get("logged_in"): grant()
      secure: |
        if time.time() - request.session["idp_auth_time"] > MAX_IDP_AGE:
            return redirect(idp_authn_url(prompt="login"))
        grant()
    javascript:
      vulnerable: |
        if (req.session.user) next();
      secure: |
        if (Date.now() / 1000 - req.session.idpAuthTime > MAX_IDP_AGE)
          return res.redirect(idpAuthUrl({ prompt: "login" }));
        next();
    java:
      vulnerable: |
        if (session.getAttribute("user") != null) chain.doFilter(req, res);
      secure: |
        long authTime = (long) session.getAttribute("idpAuthTime");
        if (Instant.now().getEpochSecond() - authTime > MAX_IDP_AGE) redirectToIdp(res);
        else chain.doFilter(req, res);
    csharp:
      vulnerable: |
        if (User.Identity.IsAuthenticated) return Ok();
      secure: |
        var authTime = long.Parse(User.FindFirstValue("auth_time"));
        if (DateTimeOffset.UtcNow.ToUnixTimeSeconds() - authTime > MaxIdpAge)
            return Challenge(new AuthenticationProperties { Items = { ["prompt"] = "login" } });

