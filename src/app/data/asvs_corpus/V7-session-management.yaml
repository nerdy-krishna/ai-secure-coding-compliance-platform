- id: V7.5.3
  facet: Session Management
  section: Defenses Against Session Abuse
  level: 3
  security_rule: >-
    Highly sensitive transactions or operations must require further
    authentication with at least one factor, or a secondary verification
    step, before they are carried out.
  vulnerability_pattern: >-
    A high-value operation such as a large transfer or a destructive
    administrative action proceeds on the strength of the existing session
    alone, so a hijacked session can perform it unchecked.
  secure_pattern: >-
    Before a high-risk operation the application demands step-up
    authentication or a secondary verification — a re-entered factor or a
    one-time confirmation — and only proceeds once it succeeds.
  code_patterns:
    generic:
      vulnerable: |
        if session.valid: transfer(funds, amount)
      secure: |
        if amount > HIGH_RISK_THRESHOLD and not stepUpVerified(session): requireStepUp()
        transfer(funds, amount)
    python:
      vulnerable: |
        @login_required
        def wire_transfer(request): bank.transfer(request.user, amount)
      secure: |
        @login_required
        def wire_transfer(request):
            if not otp_verified(request.user, request.POST["otp"]): return require_otp()
            bank.transfer(request.user, amount)
    javascript:
      vulnerable: |
        app.post("/transfer", requireLogin, (req, res) => bank.transfer(req.user, req.body.amount));
      secure: |
        app.post("/transfer", requireLogin, async (req, res) => {
          if (!await verifyOtp(req.user, req.body.otp)) return res.status(401).json({ stepUp: true });
          bank.transfer(req.user, req.body.amount);
        });
    java:
      vulnerable: |
        @PostMapping("/admin/delete-all") void deleteAll() { repo.deleteAll(); }
      secure: |
        @PostMapping("/admin/delete-all") void deleteAll(@RequestParam String otp) {
            if (!mfaService.verify(currentUser(), otp)) throw new AccessDeniedException("step-up required");
            repo.deleteAll();
        }
    csharp:
      vulnerable: |
        [Authorize] public IActionResult Payout(decimal amount) { _bank.Payout(amount); return Ok(); }
      secure: |
        [Authorize] public async Task<IActionResult> Payout(decimal amount, string otp) {
            if (!await _mfa.VerifyAsync(User.GetId(), otp)) return Unauthorized(new { stepUp = true });
            _bank.Payout(amount); return Ok();
        }

