- id: V14.2.7
  facet: Data Protection
  section: General Data Protection
  level: 3
  security_rule: >-
    Sensitive information must be subject to retention classification so
    that outdated or unnecessary data is deleted automatically, on a
    defined schedule, or when the situation requires.
  vulnerability_pattern: >-
    Sensitive records accumulate indefinitely with no retention metadata
    or deletion job, so personal data lingers far beyond the period it was
    needed and grows the breach blast radius.
  secure_pattern: >-
    Records carry a retention or expiry attribute and a scheduled job
    deletes or anonymises data once its retention period has elapsed.
  code_patterns:
    generic:
      vulnerable: |
        save(record)                             # stored forever
      secure: |
        save(record, expires_at=now() + retention_period(record.level))
        scheduled_job: delete where expires_at < now()
    python:
      vulnerable: |
        db.session.add(AuditEntry(data=payload))
      secure: |
        db.session.add(AuditEntry(data=payload,
                                  delete_after=date.today() + timedelta(days=90)))
    java:
      vulnerable: |
        repository.save(new AuditEntry(payload));
      secure: |
        repository.save(new AuditEntry(payload, Instant.now().plus(90, ChronoUnit.DAYS)));
    csharp:
      vulnerable: |
        _db.AuditEntries.Add(new AuditEntry(payload));
      secure: |
        _db.AuditEntries.Add(new AuditEntry(payload, DateTime.UtcNow.AddDays(90)));

