- id: V14.2.5
  facet: Data Protection
  section: General Data Protection
  level: 3
  security_rule: >-
    Caching must only store responses that have the expected content type
    and contain no sensitive dynamic content, and the server must return a
    404 or 302 for non-existent files rather than a different valid file,
    to prevent Web Cache Deception attacks.
  vulnerability_pattern: >-
    A shared cache stores responses based on URL suffix alone, so a
    request for a profile page with a fake static extension is cached as a
    public asset and a later visitor is served another user's data.
  secure_pattern: >-
    Cache rules key on the actual response content type and exclude
    dynamic sensitive responses, and the server returns 404 or 302 for
    unknown paths instead of serving an unrelated valid resource.
  code_patterns:
    generic:
      vulnerable: |
        if url.endswith(".css"): cache_publicly(response)   # trusts the suffix
      secure: |
        if response.content_type == "text/css" and not response.is_dynamic:
            cache_publicly(response)
    javascript:
      vulnerable: |
        if (req.path.endsWith(".jpg")) res.set("Cache-Control", "public, max-age=86400");
      secure: |
        if (res.get("Content-Type") === "image/jpeg" && !res.locals.sensitive)
          res.set("Cache-Control", "public, max-age=86400");
    python:
      vulnerable: |
        if request.path.endswith(".js"):
            response.headers["Cache-Control"] = "public, max-age=86400"
      secure: |
        if response.content_type == "application/javascript" and not response.is_dynamic:
            response.headers["Cache-Control"] = "public, max-age=86400"

