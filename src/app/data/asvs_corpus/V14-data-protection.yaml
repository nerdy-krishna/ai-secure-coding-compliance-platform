- id: V14.2.8
  facet: Data Protection
  section: General Data Protection
  level: 3
  security_rule: >-
    Sensitive information must be stripped from the metadata of
    user-submitted files, such as EXIF geolocation, unless the user has
    consented to its storage.
  vulnerability_pattern: >-
    Uploaded files are stored or re-served with their original metadata
    intact, so embedded EXIF GPS coordinates, author names, or device
    details leak the submitter's personal information.
  secure_pattern: >-
    File metadata is parsed and sensitive fields are removed before the
    file is stored or shared, unless the user has explicitly consented to
    retaining that metadata.
  code_patterns:
    generic:
      vulnerable: |
        store(uploadedImage)                     # EXIF GPS retained
      secure: |
        store(stripMetadata(uploadedImage))
    python:
      vulnerable: |
        img = Image.open(upload); img.save(dest)
      secure: |
        img = Image.open(upload)
        clean = Image.new(img.mode, img.size); clean.putdata(list(img.getdata()))
        clean.save(dest)                         # no EXIF carried over
    javascript:
      vulnerable: |
        fs.writeFileSync(dest, uploadBuffer);
      secure: |
        const clean = await sharp(uploadBuffer).rotate().withMetadata(false).toBuffer();
        fs.writeFileSync(dest, clean);
    java:
      vulnerable: |
        Files.copy(upload.getInputStream(), dest);
      secure: |
        BufferedImage img = ImageIO.read(upload.getInputStream());
        ImageIO.write(img, "jpg", dest.toFile());   // re-encode drops EXIF
    csharp:
      vulnerable: |
        await upload.CopyToAsync(File.Create(dest));
      secure: |
        using var img = await Image.LoadAsync(upload.OpenReadStream());
        img.Metadata.ExifProfile = null;
        await img.SaveAsJpegAsync(dest);

# ---------------------------------------------------------------------------
# V14.3 — Client-side Data Protection
# ---------------------------------------------------------------------------

- id: V14.3.1
  facet: Data Protection
  section: Client-side Data Protection
  level: 1
  security_rule: >-
    Authenticated data must be cleared from client storage such as the
    browser DOM after the client or session is terminated, with the
    Clear-Site-Data response header used where possible and a client-side
    fallback for when the server is unreachable.
  vulnerability_pattern: >-
    After logout or session expiry, tokens and personal data remain in the
    DOM, localStorage, or sessionStorage, so the next user of the device
    can recover them.
  secure_pattern: >-
    Logout clears client storage explicitly on the client side and the
    server sends a Clear-Site-Data header so cached authenticated data is
    wiped even if one path fails.
  code_patterns:
    generic:
      vulnerable: |
        on_logout(): redirect("/login")          # client storage left intact
      secure: |
        on_logout():
            clearClientStorage(); set_header("Clear-Site-Data", "\"storage\"")
    javascript:
      vulnerable: |
        function logout() { window.location = "/login"; }
      secure: |
        function logout() {
          localStorage.clear(); sessionStorage.clear();
          window.location = "/login";
        }
    python:
      vulnerable: |
        return redirect("/login")                # no Clear-Site-Data sent
      secure: |
        resp = redirect("/login")
        resp.headers["Clear-Site-Data"] = '"cache", "cookies", "storage"'
        return resp
    java:
      vulnerable: |
        response.sendRedirect("/login");
      secure: |
        response.setHeader("Clear-Site-Data", "\"cache\", \"cookies\", \"storage\"");
        response.sendRedirect("/login");
    csharp:
      vulnerable: |
        return Redirect("/login");
      secure: |
        Response.Headers["Clear-Site-Data"] = "\"cache\", \"cookies\", \"storage\"";
        return Redirect("/login");

# ---------------------------------------------------------------------------

- id: V14.3.2
  facet: Data Protection
  section: Client-side Data Protection
  level: 2
  security_rule: >-
    The application must set sufficient anti-caching HTTP response header
    fields, such as Cache-Control with no-store, so that sensitive data is
    not cached in browsers.
  vulnerability_pattern: >-
    Responses carrying sensitive data are returned without anti-caching
    headers, so browsers and intermediaries store them on disk where they
    can be retrieved later.
  secure_pattern: >-
    Responses containing sensitive data carry Cache-Control set to
    no-store so neither the browser nor any intermediary retains a copy.
  code_patterns:
    generic:
      vulnerable: |
        respond(sensitiveBody)                   # no Cache-Control header
      secure: |
        respond(sensitiveBody, headers={"Cache-Control": "no-store"})
    python:
      vulnerable: |
        return jsonify(account=account_details)
      secure: |
        resp = jsonify(account=account_details)
        resp.headers["Cache-Control"] = "no-store"
        return resp
    javascript:
      vulnerable: |
        res.json(accountDetails);
      secure: |
        res.set("Cache-Control", "no-store").json(accountDetails);
    java:
      vulnerable: |
        return ResponseEntity.ok(accountDetails);
      secure: |
        return ResponseEntity.ok()
                 .header("Cache-Control", "no-store").body(accountDetails);
    csharp:
      vulnerable: |
        return Ok(accountDetails);
      secure: |
        Response.Headers.CacheControl = "no-store";
        return Ok(accountDetails);

# ---------------------------------------------------------------------------

- id: V14.3.3
  facet: Data Protection
  section: Client-side Data Protection
  level: 2
  security_rule: >-
    Data stored in browser storage such as localStorage, sessionStorage,
    IndexedDB, or cookies must not contain sensitive data, with the sole
    exception of session tokens.
  vulnerability_pattern: >-
    Sensitive values such as personal identifiers, payment data, or API
    keys are written to localStorage or other browser storage, where any
    script on the page including injected XSS can read them.
  secure_pattern: >-
    Browser storage holds only non-sensitive UI state and, at most,
    session tokens, while sensitive data stays server-side and is fetched
    on demand over an authenticated request.
  code_patterns:
    generic:
      vulnerable: |
        browserStorage.set("ssn", user.ssn)
      secure: |
        browserStorage.set("theme", "dark")      # only non-sensitive UI state
    javascript:
      vulnerable: |
        localStorage.setItem("creditCard", card.number);
      secure: |
        localStorage.setItem("uiPrefs", JSON.stringify({ theme: "dark" }));
