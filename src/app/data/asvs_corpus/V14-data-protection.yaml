# OWASP ASVS 5.0 — Chapter V14: Data Protection
# Hand-authored enriched corpus (Framework Expansion enrichment effort).
# Rendered to the RAG corpus by scripts/build_enriched_corpus.py.
#
# Each entry: a security_rule (the principle), a vulnerability_pattern and
# secure_pattern (concept descriptions — no '*' or '[' — these feed the
# agent's generic fallback), and short seed-sized code_patterns per
# language (generic + Python/JavaScript/Java/C# for ASVS).
#
# STATUS: complete — V14.1 + V14.2 + V14.3 (13 of 13 requirements).

# ---------------------------------------------------------------------------
# V14.1 — Data Protection Documentation
# ---------------------------------------------------------------------------

- id: V14.1.1
  facet: Data Protection
  section: Data Protection Documentation
  level: 2
  security_rule: >-
    All sensitive data the application creates or processes must be
    identified and classified into protection levels, including data that
    is merely encoded such as Base64 strings or the plaintext payload of a
    JWT, with classification informed by applicable privacy regulations.
  vulnerability_pattern: >-
    Sensitive values are treated as protected simply because they are
    encoded, so Base64 blobs or JWT payloads carry secrets in plain view
    and no classification exists to drive encryption or access controls.
  secure_pattern: >-
    Every data element is catalogued and assigned a protection level, with
    encoded-but-not-encrypted data recognised as plaintext, and the
    classification reflects the privacy regimes the application must meet.
  code_patterns:
    generic:
      vulnerable: |
        token = base64encode(ssn)        # encoded, treated as if protected
      secure: |
        classify(ssn, level="restricted")   # encoding is not protection
        token = encrypt(ssn, key)
    python:
      vulnerable: |
        payload = base64.b64encode(json.dumps({"ssn": ssn}).encode())
      secure: |
        # ssn classified RESTRICTED in the data inventory; encrypt at rest
        payload = fernet.encrypt(json.dumps({"ssn": ssn}).encode())
    java:
      vulnerable: |
        String token = Base64.getEncoder().encodeToString(ssn.getBytes());
      secure: |
        // ssn classified RESTRICTED; Base64 is not confidentiality
        byte[] token = cipher.doFinal(ssn.getBytes(StandardCharsets.UTF_8));

# ---------------------------------------------------------------------------

- id: V14.1.2
  facet: Data Protection
  section: Data Protection Documentation
  level: 2
  security_rule: >-
    Each sensitive-data protection level must have a documented set of
    protection requirements covering encryption, integrity verification,
    retention, logging rules, access control for sensitive data in logs,
    database-level encryption, and the privacy technologies to be applied.
  vulnerability_pattern: >-
    Protection levels exist in name only with no documented requirements,
    so developers guess at how to encrypt, retain, or log each class of
    data and apply inconsistent or absent controls.
  secure_pattern: >-
    Every protection level has a written specification stating the
    required encryption, integrity checks, retention period, logging and
    log access rules, and privacy-enhancing technologies for that class.
  code_patterns:
    generic:
      vulnerable: |
        # protection levels named but undocumented
        store(record, level="confidential")   # no requirements attached
      secure: |
        policy = load_policy("confidential")   # encryption, retention, logging
        store(record, policy=policy)

# ---------------------------------------------------------------------------
# V14.2 — General Data Protection
# ---------------------------------------------------------------------------

- id: V14.2.1
  facet: Data Protection
  section: General Data Protection
  level: 1
  security_rule: >-
    Sensitive data must be sent to the server only in the HTTP message
    body or header fields, never in the URL path or query string, so that
    API keys and session tokens are not exposed.
  vulnerability_pattern: >-
    Secrets such as API keys or session tokens are placed in the URL or
    query string, where they leak into server logs, browser history,
    proxies, and Referer headers.
  secure_pattern: >-
    Sensitive values travel in the request body or in a header field such
    as Authorization, keeping them out of access logs, caches, and the
    Referer header.
  code_patterns:
    generic:
      vulnerable: |
        get("https://api.example.com/data?api_key=" + apiKey)
      secure: |
        get("https://api.example.com/data", headers={"Authorization": "Bearer " + apiKey})
    python:
      vulnerable: |
        requests.get(f"https://api.example.com/data?token={session_token}")
      secure: |
        requests.get("https://api.example.com/data",
                     headers={"Authorization": f"Bearer {session_token}"})
    javascript:
      vulnerable: |
        fetch(`/api/data?api_key=${apiKey}`);
      secure: |
        fetch("/api/data", { headers: { Authorization: `Bearer ${apiKey}` } });
    java:
      vulnerable: |
        var req = HttpRequest.newBuilder(URI.create(base + "?token=" + token)).build();
      secure: |
        var req = HttpRequest.newBuilder(URI.create(base))
                     .header("Authorization", "Bearer " + token).build();
    csharp:
      vulnerable: |
        await client.GetAsync($"https://api.example.com/data?apiKey={apiKey}");
      secure: |
        client.DefaultRequestHeaders.Authorization = new("Bearer", apiKey);
        await client.GetAsync("https://api.example.com/data");

# ---------------------------------------------------------------------------

- id: V14.2.2
  facet: Data Protection
  section: General Data Protection
  level: 2
  security_rule: >-
    The application must prevent sensitive data from being cached in
    server-side components such as load balancers and application caches,
    or ensure that such data is securely purged after use.
  vulnerability_pattern: >-
    Responses or fragments containing sensitive data are stored in a
    shared server cache without scoping, so the data persists and can be
    served to other users or read from the cache store.
  secure_pattern: >-
    Sensitive responses are excluded from shared caches, or cache entries
    are scoped per user and have a short time-to-live, and the cache is
    securely purged once the data is no longer needed.
  code_patterns:
    generic:
      vulnerable: |
        cache.set("profile", sensitiveProfile)      # shared, never purged
      secure: |
        cache.set("profile:" + userId, redact(profile), ttl=60)
        cache.delete("profile:" + userId)           # purge after use
    python:
      vulnerable: |
        cache.set("report", confidential_report)
      secure: |
        cache.set(f"report:{user.id}", confidential_report, timeout=60)
        cache.delete(f"report:{user.id}")
    java:
      vulnerable: |
        appCache.put("balance", accountBalance);
      secure: |
        appCache.put("balance:" + userId, accountBalance, Duration.ofSeconds(60));
        appCache.invalidate("balance:" + userId);
    csharp:
      vulnerable: |
        _cache.Set("statement", statement);
      secure: |
        _cache.Set($"statement:{userId}", statement, TimeSpan.FromSeconds(60));
        _cache.Remove($"statement:{userId}");

# ---------------------------------------------------------------------------

- id: V14.2.3
  facet: Data Protection
  section: General Data Protection
  level: 2
  security_rule: >-
    Sensitive data must not be sent to untrusted third parties such as
    analytics trackers or advertising scripts, so that data is not
    collected outside the application's control.
  vulnerability_pattern: >-
    Sensitive values are passed to third-party tracking, analytics, or
    advertising calls, leaking personal data to parties the application
    does not control.
  secure_pattern: >-
    Only non-sensitive, approved fields are sent to third-party services,
    and sensitive data is stripped, hashed, or withheld before any
    external call is made.
  code_patterns:
    generic:
      vulnerable: |
        tracker.send({event: "signup", email: user.email, ssn: user.ssn})
      secure: |
        tracker.send({event: "signup"})        # no sensitive fields leave
    python:
      vulnerable: |
        analytics.track(user.email, "purchase", {"card": card_number})
      secure: |
        analytics.track(anonymized_id(user), "purchase", {"amount": amount})
    javascript:
      vulnerable: |
        gtag("event", "login", { user_email: user.email });
      secure: |
        gtag("event", "login");   // no PII forwarded to the tracker
    java:
      vulnerable: |
        analyticsClient.track(user.getEmail(), Map.of("ssn", user.getSsn()));
      secure: |
        analyticsClient.track(pseudonym(user), Map.of("plan", user.getPlan()));
    csharp:
      vulnerable: |
        _analytics.Track(user.Email, new { CardNumber = user.CardNumber });
      secure: |
        _analytics.Track(Pseudonymize(user), new { Plan = user.Plan });

