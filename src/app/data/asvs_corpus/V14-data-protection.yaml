- id: V14.2.6
  facet: Data Protection
  section: General Data Protection
  level: 3
  security_rule: >-
    The application must return only the minimum sensitive data needed for
    a feature, such as the last four digits of a card number, and mask any
    complete sensitive value in the UI unless the user explicitly reveals
    it.
  vulnerability_pattern: >-
    An API or page returns the full sensitive value when only a fragment
    is needed, so complete card numbers or national IDs are exposed in
    responses, logs, and the rendered UI.
  secure_pattern: >-
    Responses carry only the masked or truncated form of sensitive values,
    and the full value is returned solely on an explicit, authorised
    reveal action.
  code_patterns:
    generic:
      vulnerable: |
        return {"card": card.number}             # full PAN in the response
      secure: |
        return {"card": "**** **** **** " + card.number[-4:]}
    python:
      vulnerable: |
        return jsonify(card_number=user.card_number)
      secure: |
        return jsonify(card_last4=user.card_number[-4:])
    javascript:
      vulnerable: |
        res.json({ ssn: user.ssn });
      secure: |
        res.json({ ssnLast4: user.ssn.slice(-4) });
    java:
      vulnerable: |
        return new CardDto(card.getNumber());
      secure: |
        return new CardDto("****" + card.getNumber().substring(card.getNumber().length() - 4));
    csharp:
      vulnerable: |
        return new CardDto { Number = card.Number };
      secure: |
        return new CardDto { Last4 = card.Number[^4..] };

