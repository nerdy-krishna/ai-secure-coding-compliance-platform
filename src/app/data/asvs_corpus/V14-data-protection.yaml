- id: V14.2.4
  facet: Data Protection
  section: General Data Protection
  level: 2
  security_rule: >-
    The encryption, integrity verification, retention, logging, log access
    control, and privacy controls for sensitive data must be implemented
    exactly as defined in the documentation for that data's protection
    level.
  vulnerability_pattern: >-
    Code handles sensitive data with ad hoc controls that diverge from the
    documented protection level, so the actual encryption, retention, or
    logging behaviour does not match the stated requirements.
  secure_pattern: >-
    The protection level for a data element drives its handling, with
    encryption, retention, and logging behaviour read from the documented
    policy rather than hardcoded per call site.
  code_patterns:
    generic:
      vulnerable: |
        log.info("user record: " + record)      # ignores the data policy
      secure: |
        policy = policy_for(record.level)
        log.info("user record: " + policy.redact(record))
    python:
      vulnerable: |
        db.save(record)                          # no encryption, ad hoc
      secure: |
        policy = policy_for(record.classification)
        db.save(policy.encrypt(record), retention=policy.retention_days)
    java:
      vulnerable: |
        repository.save(record);
      secure: |
        ProtectionPolicy p = policyFor(record.getLevel());
        repository.save(p.encrypt(record), p.retention());
    csharp:
      vulnerable: |
        _repository.Save(record);
      secure: |
        var policy = PolicyFor(record.Classification);
        _repository.Save(policy.Encrypt(record), policy.Retention);

